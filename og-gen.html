<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    width: 1080px;
    height: 1080px;
    background: #1E3170;
    background-image:
        repeating-linear-gradient(0deg,rgba(171,196,255,0.07) 0,rgba(171,196,255,0.07) 1px,transparent 1px,transparent 28px),
        repeating-linear-gradient(90deg,rgba(171,196,255,0.07) 0,rgba(171,196,255,0.07) 1px,transparent 1px,transparent 28px);
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 100px 100px;
    font-family: 'Instrument Sans', sans-serif;
    overflow: hidden;
}
.label {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,.45);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 24px;
}
.title {
    font-size: 112px;
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: white;
}
.title .accent { color: #03FDA9; }
.sub {
    margin-top: 36px;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,.5);
    letter-spacing: .02em;
}
.sub span { color: #03FDA9; }
</style>
</head>
<body>
    <div class="label">Mon Education Financière</div>
    <div class="title">La Semaine<br><span class="accent">Money Smart</span></div>
</body>
</html>
